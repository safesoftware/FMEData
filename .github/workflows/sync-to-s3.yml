name: Sync to S3
 
on:
  push:
    branches:
      - main
 
jobs:
  sync:
    runs-on: ubuntu-latest
 
    permissions:
      id-token: write   # Required for OIDC auth (recommended)
      contents: read
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Sync to S3
        run: |
          aws s3 sync . s3://FMEData/FMEData/ \
            --delete \
            --exclude "index.html" \
            --exclude ".git/*" \
            --exclude ".github/*"
 
      - name: Create and upload ZIP
        run: |
          cd ..
          zip -r FMEData.zip FMEData/ \
            --exclude "FMEData/.git/*" \
            --exclude "FMEData/.github/*"
          aws s3 cp FMEData.zip s3://FMEData/FMEData.zip
